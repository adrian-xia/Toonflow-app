services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${TEST_DB_NAME:-toonflow_db_test}
      POSTGRES_USER: ${TEST_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-postgres}
    ports:
      - "${TEST_DB_PORT:-55432}:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data: {}
