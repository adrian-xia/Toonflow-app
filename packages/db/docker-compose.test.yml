services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: toonflow_db_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${TEST_DB_PORT:-55432}:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data: {}
