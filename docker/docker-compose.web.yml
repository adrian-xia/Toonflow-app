# 新版 Web 前端 Docker Compose 配置
# 用法: docker-compose -f docker/docker-compose.web.yml up -d --build

services:
  toonflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    image: toonflow:web
    container_name: toonflow-web
    restart: unless-stopped
    ports:
      - "3000:80"
      - "60000:60000"
    environment:
      - NODE_ENV=prod
      - DB_HOST=192.168.1.100
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_NAME=toonflow
    volumes:
      - ~/.toonflow/uploads:/app/uploads
      - ~/.toonflow/logs:/var/log
      - ~/.toonflow/env:/app/env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
